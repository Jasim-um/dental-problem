<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;

/* background image */

background-image:url("{{ url_for('static', filename='img/admin.jpg') }}");
background-size:cover;
background-position:center;

height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN CARD */

.card{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:350px;
text-align:center;

box-shadow:0 5px 25px rgba(0,0,0,0.2);
}

/* TITLE */

.title{
font-size:28px;
margin-bottom:10px;
}

/* LINE */

.line{
height:3px;
background:#444;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin:10px 0;

border-radius:6px;
border:1px solid #ccc;

font-size:16px;
}

/* BUTTON */

button{
width:100%;
padding:10px;

background:#2f80ed;
color:white;

border:none;
border-radius:6px;

font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c5dc9;
}

/* HOME BUTTON */

.home-btn{
position:fixed;
top:30px;
left:30px;

padding:10px 20px;
background:#27ae60;
color:white;

text-decoration:none;
border-radius:6px;
}

.home-btn:hover{
background:#1e874b;
}

</style>
</head>

<body>

<a href="/" class="home-btn">Home</a>

<div class="card">

<h2 class="title">Admin Login</h2>

<div class="line"></div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
